# ---------------------------------------------------------------------------
# DB 접속 정보
# ---------------------------------------------------------------------------
source:
  host: <SOURCE_DB_HOST>
  port: 3306
  user: <SOURCE_DB_USER>
  password: <SOURCE_DB_PASSWORD>
  database: <SOURCE_DB_NAME>

# SSH tunnel 접속 정보(Optional)
source_ssh_tunnel:
  ssh_host: <SOURCE_BASTION_HOST>
  ssh_port: 22
  ssh_user: <SOURCE_SSH_USER>
  ssh_pkey_path: <PATH_TO_SOURCE_SSH_KEY>
  remote_host: <SOURCE_DB_HOST>
  remote_port: 3306
  local_port: 3308  # 예시 로컬 포트

destination:
  host: <DEST_DB_HOST>
  port: 3306
  user: <DEST_DB_USER>
  password: <DEST_DB_PASSWORD>
  # database: <DEST_DB_NAME>
  database: <DEST_DB_NAME>

# destination_ssh_tunnel:
#   ssh_host: <DEST_BASTION_HOST>
#   ssh_port: 22
#   ssh_user: <DEST_SSH_USER>
#   ssh_pkey_path: <PATH_TO_DEST_SSH_KEY>
#   remote_host: <DEST_DB_HOST>
#   remote_port: 3306
#   local_port: 3309


# ---------------------------------------------------------------------------
# 마이그레이션 작업 정의
#
# - 하나 이상의 마이그레이션 작업을 순차적으로 실행합니다.
# - 각 항목에 대해 extract_sql을 실행하고 destination_table로 저장합니다.
# ---------------------------------------------------------------------------
migrations:
